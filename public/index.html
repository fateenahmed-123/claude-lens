<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; connect-src 'self'">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>claude-lens</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M15.4 5.2 C12.6 4.4 11.4 5.9 11.4 7.9 L11.4 13.2' fill='none' stroke='%23d67a54' stroke-width='2.1' stroke-linecap='round'/%3E%3Cline x1='7.8' y1='9.8' x2='15.2' y2='9.8' stroke='%23d67a54' stroke-width='2.1' stroke-linecap='round'/%3E%3Ccircle cx='11.4' cy='16.7' r='1.35' fill='%23d67a54'/%3E%3Ccircle cx='11.4' cy='20.2' r='1.35' fill='%23d67a54'/%3E%3C/svg%3E">
<style>
  :root {
    --bg: oklch(0.972 0.007 80);
    --panel: oklch(0.945 0.009 78);
    --raised: oklch(0.99 0.004 85);
    --ink: oklch(0.26 0.014 55);
    --muted: oklch(0.52 0.016 55);
    --faint: oklch(0.66 0.012 60);
    --line: oklch(0.885 0.010 75);
    --line-soft: oklch(0.92 0.008 78);
    --accent: oklch(0.58 0.135 42);
    --accent-ink: oklch(0.44 0.115 40);
    --accent-wash: oklch(0.945 0.022 55);
    --think: oklch(0.55 0.03 290);
    --think-wash: oklch(0.945 0.012 290);
    --ok: oklch(0.55 0.11 150);
    --err: oklch(0.55 0.16 25);
    --err-wash: oklch(0.95 0.02 25);
    --add-wash: oklch(0.945 0.035 150);
    --del-wash: oklch(0.945 0.028 25);
    --shadow: 0 1px 3px oklch(0.3 0.02 60 / 0.08);
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --bg: oklch(0.16 0.003 48);
    --panel: oklch(0.14 0.003 48);
    --raised: oklch(0.205 0.004 48);
    --ink: oklch(0.885 0.005 70);
    --muted: oklch(0.63 0.006 65);
    --faint: oklch(0.49 0.005 65);
    --line: oklch(0.265 0.005 55);
    --line-soft: oklch(0.225 0.004 55);
    --accent: oklch(0.72 0.115 48);
    --accent-ink: oklch(0.78 0.10 50);
    --accent-wash: oklch(0.215 0.022 50);
    --think: oklch(0.68 0.035 290);
    --think-wash: oklch(0.195 0.013 290);
    --ok: oklch(0.70 0.10 150);
    --err: oklch(0.68 0.13 25);
    --err-wash: oklch(0.205 0.020 25);
    --add-wash: oklch(0.21 0.028 150);
    --del-wash: oklch(0.21 0.023 25);
    --shadow: 0 1px 3px oklch(0.08 0.005 60 / 0.5);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme]) {
      --bg: oklch(0.16 0.003 48); --panel: oklch(0.14 0.003 48);
      --raised: oklch(0.205 0.004 48); --ink: oklch(0.885 0.005 70);
      --muted: oklch(0.63 0.006 65); --faint: oklch(0.49 0.005 65);
      --line: oklch(0.265 0.005 55); --line-soft: oklch(0.225 0.004 55);
      --accent: oklch(0.72 0.115 48); --accent-ink: oklch(0.78 0.10 50);
      --accent-wash: oklch(0.215 0.022 50);
      --think: oklch(0.68 0.035 290); --think-wash: oklch(0.195 0.013 290);
      --ok: oklch(0.70 0.10 150); --err: oklch(0.68 0.13 25);
      --err-wash: oklch(0.205 0.020 25);
      --add-wash: oklch(0.21 0.028 150); --del-wash: oklch(0.21 0.023 25);
      --shadow: 0 1px 3px oklch(0.08 0.005 60 / 0.5);
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font: 14px/1.55 var(--sans);
    background: var(--bg); color: var(--ink);
    display: flex;
  }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }
  button:focus-visible, a:focus-visible, input:focus-visible, summary:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px;
  }

  /* ------------------------------------------------ sidebar */
  #sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 300px;
    background: var(--panel);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
  }
  #brand {
    padding: 18px 18px 14px; display: flex; align-items: baseline; gap: 8px;
  }
  #brand .name { font-weight: 650; font-size: 15px; letter-spacing: -0.01em; }
  #brand .ver { color: var(--faint); font-size: 11px; font-family: var(--mono); }
  #view-toggle { display: flex; gap: 5px; padding: 0 16px 12px; }
  #view-toggle button {
    font-size: 11.5px; padding: 4px 11px; border-radius: 7px;
    border: 1px solid var(--line); color: var(--muted);
  }
  #view-toggle button:hover { color: var(--ink); }
  #view-toggle button.active { background: var(--raised); color: var(--ink); font-weight: 600; }
  #proj-list { overflow-y: auto; flex: 1; padding: 0 10px 24px; }
  .date-h {
    font-size: 10px; font-weight: 650; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--faint); padding: 14px 9px 4px;
  }
  .proj .date-h { padding: 8px 9px 2px; }
  .proj > summary {
    list-style: none; cursor: pointer; padding: 8px 8px 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--muted); display: flex; align-items: center; gap: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    position: sticky; top: 0; background: var(--panel); z-index: 2;
  }
  .proj > summary .cnt { margin-left: auto; flex: none; color: var(--faint); font-family: var(--mono); font-size: 10px; letter-spacing: 0; }
  .proj > summary::-webkit-details-marker { display: none; }
  .proj > summary .tw { transition: transform 0.18s cubic-bezier(0.22,1,0.36,1); font-size: 9px; color: var(--faint); flex: none; }
  .proj[open] > summary .tw { transform: rotate(90deg); }
  .proj > summary .pn { overflow: hidden; text-overflow: ellipsis; direction: rtl; text-align: left; }
  .sess {
    display: block; width: 100%; text-align: left; padding: 7px 9px; border-radius: 7px;
    margin: 1px 0;
  }
  .sess:hover { background: var(--line-soft); }
  .sess.active { background: var(--accent-wash); }
  .sess .t {
    display: block; font-size: 13px; font-weight: 500; line-height: 1.35;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sess.active .t { color: var(--accent-ink); }
  .sess .m { display: block; font-size: 11px; color: var(--faint); margin-top: 1px; font-family: var(--mono); }
  #side-foot { padding: 10px 18px; border-top: 1px solid var(--line); font-size: 11px; color: var(--faint); }
  #side-foot code { font-family: var(--mono); }

  /* ------------------------------------------------ main */
  #main { flex: 1; min-width: 0; margin-left: 300px; }
  #topbar {
    position: sticky; top: 0; z-index: 5;
    background: color-mix(in oklab, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 10px 28px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  #topbar h1 {
    font-size: 15px; font-weight: 650; margin: 0; letter-spacing: -0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 34ch;
  }
  #stats { display: flex; gap: 14px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  #stats b { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }
  #controls { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  #search {
    font: 12px var(--sans); color: var(--ink);
    background: var(--panel); border: 1px solid var(--line); border-radius: 7px;
    padding: 5px 10px; width: 170px;
  }
  #search::placeholder { color: var(--faint); }
  .ctl {
    font-size: 12px; color: var(--muted); padding: 5px 9px; border-radius: 7px;
    border: 1px solid transparent;
  }
  .ctl:hover { background: var(--panel); border-color: var(--line); color: var(--ink); }

  #scroll { max-width: 860px; margin: 0 auto; padding: 30px 28px 120px; }

  /* ------------------------------------------------ transcript */
  .turn { margin: 26px 0; }
  .turn.filtered { display: none; }

  .prompt {
    background: var(--accent-wash);
    border: 1px solid color-mix(in oklab, var(--accent) 18%, var(--line));
    border-radius: 10px; padding: 13px 17px; margin: 34px 0 18px;
    box-shadow: var(--shadow); max-width: 76ch;
  }
  .prompt .who {
    font-size: 10.5px; font-weight: 650; letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--accent-ink); display: flex; gap: 10px; align-items: baseline; margin-bottom: 5px;
  }
  .prompt .who time { color: var(--faint); font-weight: 500; letter-spacing: 0.02em; font-family: var(--mono); }
  .prompt .body { font-size: 14.5px; line-height: 1.6; overflow-wrap: break-word; }
  .prompt .body p:first-child { margin-top: 0; }
  .prompt .body p:last-child { margin-bottom: 0; }
  .prompt img { max-width: 100%; max-height: 260px; border-radius: 7px; border: 1px solid var(--line); display: block; margin: 8px 0; cursor: zoom-in; }
  .prompt img.zoom { max-height: none; cursor: zoom-out; }
  .cmd-chip {
    font-family: var(--mono); font-size: 12.5px; background: var(--raised);
    border: 1px solid var(--line); border-radius: 6px; padding: 2px 8px; display: inline-block;
  }

  .a-text {
    font-size: 15px; line-height: 1.66; max-width: 72ch; overflow-wrap: break-word;
    margin: 16px 0;
  }
  .a-text > :first-child { margin-top: 0; }
  .a-text h1, .a-text h2, .a-text h3, .a-text h4 { line-height: 1.3; margin: 1.3em 0 0.5em; letter-spacing: -0.01em; }
  .a-text h1 { font-size: 1.35em; } .a-text h2 { font-size: 1.2em; } .a-text h3 { font-size: 1.08em; } .a-text h4 { font-size: 1em; }
  .a-text p { margin: 0.7em 0; }
  .a-text ul, .a-text ol { margin: 0.6em 0; padding-left: 1.5em; }
  .a-text li { margin: 0.25em 0; }
  .a-text blockquote { margin: 0.8em 0; padding: 2px 14px; color: var(--muted); border: 1px solid var(--line-soft); border-radius: 8px; background: var(--panel); }
  .a-text hr { border: none; border-top: 1px solid var(--line); margin: 1.4em 0; }
  .a-text a { color: var(--accent-ink); text-decoration: underline; text-decoration-color: color-mix(in oklab, var(--accent) 40%, transparent); }
  .a-text table { border-collapse: collapse; font-size: 13px; margin: 0.8em 0; display: block; overflow-x: auto; max-width: 100%; }
  .a-text th, .a-text td { border: 1px solid var(--line); padding: 5px 10px; text-align: left; }
  .a-text th { background: var(--panel); font-weight: 600; }
  code { font-family: var(--mono); font-size: 0.88em; background: var(--panel); border: 1px solid var(--line-soft); border-radius: 4px; padding: 0.1em 0.35em; }
  pre { background: var(--panel); border: 1px solid var(--line-soft); border-radius: 9px; padding: 12px 15px; overflow-x: auto; font-size: 12.5px; line-height: 1.5; margin: 0.8em 0; }
  pre code { background: none; border: none; padding: 0; font-size: inherit; }

  /* tool + thinking rows */
  .row {
    border: 1px solid var(--line-soft); border-radius: 9px; margin: 7px 0;
    max-width: 72ch; background: var(--raised); overflow: hidden;
  }
  .row.err { border-color: color-mix(in oklab, var(--err) 35%, var(--line)); }
  .row > .head {
    display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
    padding: 7px 12px; font-size: 12.5px; color: var(--muted); min-height: 32px;
  }
  .row > .head:hover { background: var(--panel); }
  .row .badge {
    font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.03em;
    color: var(--muted); background: var(--panel); border: 1px solid var(--line);
    border-radius: 5px; padding: 1.5px 6px; flex: none; min-width: 34px; text-align: center;
  }
  .row.err .badge { color: var(--err); border-color: color-mix(in oklab, var(--err) 40%, var(--line)); background: var(--err-wash); }
  .row .label { font-family: var(--mono); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
  .row .note { color: var(--faint); font-size: 11.5px; margin-left: auto; flex: none; font-variant-numeric: tabular-nums; }
  .row .chev { color: var(--faint); font-size: 9px; flex: none; transition: transform 0.18s cubic-bezier(0.22,1,0.36,1); }
  .row.open .chev { transform: rotate(90deg); }
  .row > .detail { border-top: 1px solid var(--line-soft); padding: 10px 14px; display: none; }
  .row.open > .detail { display: block; }
  .row .detail pre { margin: 6px 0; max-height: 420px; overflow: auto; }
  .row .detail .sec { font-size: 10.5px; font-weight: 650; letter-spacing: 0.06em; text-transform: uppercase; color: var(--faint); margin: 10px 0 4px; }
  .row .detail .sec:first-child { margin-top: 0; }
  .more { font-size: 11.5px; color: var(--accent-ink); margin: 2px 0 6px; }

  .row.think { background: var(--think-wash); border-color: color-mix(in oklab, var(--think) 20%, var(--line-soft)); }
  .row.think .badge { color: var(--think); background: transparent; border-color: color-mix(in oklab, var(--think) 30%, var(--line)); }
  .row.think .detail { font-size: 13px; color: var(--muted); line-height: 1.6; white-space: pre-wrap; overflow-wrap: break-word; }

  .row.agent { border-color: color-mix(in oklab, var(--think) 25%, var(--line)); }
  .row.agent > .detail { padding: 4px 14px 12px; }
  .row.agent .inner { margin-left: 2px; }

  .diff { font-family: var(--mono); font-size: 12px; line-height: 1.5; border: 1px solid var(--line-soft); border-radius: 8px; overflow-x: auto; margin: 6px 0; }
  .diff div { padding: 0 10px; white-space: pre; }
  .diff .d { background: var(--del-wash); color: color-mix(in oklab, var(--err) 75%, var(--ink)); }
  .diff .a { background: var(--add-wash); color: color-mix(in oklab, var(--ok) 70%, var(--ink)); }

  .divider {
    display: flex; align-items: center; gap: 12px; margin: 22px 0;
    color: var(--faint); font-size: 11px; font-family: var(--mono);
  }
  .divider::before, .divider::after { content: ""; flex: 1; border-top: 1px solid var(--line-soft); }

  .sysnote { font-size: 12.5px; color: var(--muted); font-style: italic; max-width: 72ch; margin: 12px 0; }
  .interrupt { font-size: 12px; color: var(--err); font-family: var(--mono); margin: 10px 0; }

  #empty { color: var(--muted); text-align: center; padding: 18vh 40px 0; }
  #empty h2 { font-weight: 600; font-size: 17px; color: var(--ink); margin: 0 0 8px; }
  #empty p { max-width: 46ch; margin: 6px auto; font-size: 13.5px; }
  #empty kbd { font-family: var(--mono); font-size: 11px; border: 1px solid var(--line); border-bottom-width: 2px; border-radius: 5px; padding: 1px 5px; background: var(--panel); }

  #drop-hint {
    position: fixed; inset: 12px; border: 2px dashed var(--accent); border-radius: 14px;
    background: color-mix(in oklab, var(--accent-wash) 80%, transparent);
    display: none; align-items: center; justify-content: center; z-index: 50;
    font-size: 15px; font-weight: 600; color: var(--accent-ink); pointer-events: none;
  }
  body.dragging #drop-hint { display: flex; }

  mark { background: color-mix(in oklab, var(--accent) 30%, transparent); color: inherit; border-radius: 3px; }

  /* navigation rail: one tick per prompt, hover to preview, click to jump */
  #rail {
    position: fixed; right: 10px; top: 150px; bottom: 48px; width: 12px;
    display: none; flex-direction: column; gap: 3px; z-index: 4;
  }
  body.has-session #rail.on { display: flex; }
  .tick {
    flex: 1 1 auto; min-height: 4px; max-height: 26px; width: 100%;
    border-radius: 2px; background: var(--line); cursor: pointer;
    transition: background 0.15s ease-out;
  }
  .tick:hover { background: var(--faint); }
  .tick.active { background: var(--accent); }
  .tick.gone { display: none; }
  #rail-tip {
    position: fixed; right: 30px; max-width: 320px; z-index: 6; display: none;
    background: var(--raised); border: 1px solid var(--line); border-radius: 9px;
    padding: 8px 12px; font-size: 12.5px; line-height: 1.45; box-shadow: var(--shadow);
    pointer-events: none;
  }
  #rail-tip .n {
    display: block; color: var(--accent-ink); font-weight: 650; font-size: 10.5px;
    letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 3px;
    font-family: var(--mono);
  }
  #rail-tip .s {
    color: var(--muted); display: -webkit-box; -webkit-line-clamp: 3;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  @media (max-width: 1100px) { #rail, #rail-tip { display: none !important; } }

  .session-only { display: none; }
  body.has-session .session-only { display: block; }

  #toast {
    position: fixed; bottom: 26px; left: 50%; transform: translate(-50%, 8px);
    background: var(--ink); color: var(--bg); font-size: 12.5px;
    padding: 8px 16px; border-radius: 8px; box-shadow: var(--shadow);
    opacity: 0; pointer-events: none; z-index: 60;
    transition: opacity 0.2s cubic-bezier(0.22,1,0.36,1), transform 0.2s cubic-bezier(0.22,1,0.36,1);
    max-width: 70ch;
  }
  #toast.show { opacity: 1; transform: translate(-50%, 0); }

  @media (max-width: 900px) {
    #sidebar { display: none; }
    #main { margin-left: 0; }
    #topbar { padding: 10px 16px; }
    #scroll { padding: 20px 16px 100px; }
  }
</style>
</head>
<body>

<aside id="sidebar">
  <div id="brand"><span class="name">claude-lens</span><span class="ver" id="ver">__LENS_VERSION__</span></div>
  <div id="view-toggle" role="tablist" aria-label="Sidebar arrangement">
    <button data-v="date">By date</button>
    <button data-v="project">By project</button>
  </div>
  <nav id="proj-list" aria-label="Sessions"></nav>
  <div id="side-foot">reading <code>~/.claude/projects</code></div>
</aside>

<main id="main">
  <header id="topbar">
    <h1 id="title">claude-lens</h1>
    <div id="stats"></div>
    <div id="controls">
      <input id="search" type="search" placeholder="Filter turns…" aria-label="Filter turns">
      <button class="ctl session-only" id="btn-resume" title="Resume this session in Claude Code">Resume</button>
      <button class="ctl session-only" id="btn-context" title="Copy a markdown digest to paste into a new Claude Code session">Copy context</button>
      <button class="ctl" id="btn-expand" title="Expand all tool calls">Expand</button>
      <button class="ctl" id="btn-collapse" title="Collapse all">Collapse</button>
      <button class="ctl" id="btn-theme" title="Toggle theme">Theme</button>
    </div>
  </header>
  <div id="scroll">
    <div id="empty">
      <h2>Pick a session</h2>
      <p>Choose a session from the sidebar, or drop any Claude Code <code>.jsonl</code> transcript anywhere on this page.</p>
      <p><kbd>j</kbd> / <kbd>k</kbd> jump between prompts once a session is open.</p>
    </div>
    <div id="transcript"></div>
  </div>
</main>

<div id="drop-hint">Drop a .jsonl transcript to view it</div>
<div id="toast" role="status"></div>
<nav id="rail" aria-label="Prompt navigation"></nav>
<div id="rail-tip"><span class="n"></span><span class="s"></span></div>

<script>
'use strict';

/* ============================================================ utils */

const $ = (s, el) => (el || document).querySelector(s);
const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
// transcript content is untrusted; only base64 alphabet may enter a data: URI
const b64clean = (s) => String(s).replace(/[^A-Za-z0-9+/=]/g, '');

const fmtBytes = (n) => n > 1048576 ? (n / 1048576).toFixed(1) + ' MB'
  : n > 1024 ? Math.round(n / 1024) + ' KB' : n + ' B';

const fmtTok = (n) => n >= 1e6 ? (n / 1e6).toFixed(1) + 'M'
  : n >= 1e3 ? (n / 1e3).toFixed(n >= 1e4 ? 0 : 1) + 'k' : String(n);

function fmtDur(ms) {
  const s = Math.round(ms / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
  return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
}

function relTime(t) {
  const d = Date.now() - t;
  if (d < 3600e3) return Math.max(1, Math.round(d / 60e3)) + 'm ago';
  if (d < 86400e3) return Math.round(d / 3600e3) + 'h ago';
  if (d < 7 * 86400e3) return Math.round(d / 86400e3) + 'd ago';
  return new Date(t).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

const clock = (ts) => new Date(ts).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
const dayOf = (ts) => new Date(ts).toDateString();

/* ============================================== tiny markdown renderer */

function md(src) {
  src = String(src || '');
  let html = '', pos = 0;
  for (;;) {
    const open = src.indexOf('```', pos);
    if (open === -1) { html += mdBlocks(src.slice(pos)); break; }
    html += mdBlocks(src.slice(pos, open));
    const nl = src.indexOf('\n', open + 3);
    if (nl === -1) { html += mdBlocks(src.slice(open)); break; }
    const close = src.indexOf('\n```', nl);
    const code = close === -1 ? src.slice(nl + 1) : src.slice(nl + 1, close);
    html += '<pre><code>' + esc(code.replace(/\n$/, '')) + '</code></pre>';
    if (close === -1) break;
    pos = close + 4;
    while (src[pos] === '`') pos++;
  }
  return html;
}

function mdBlocks(text) {
  const lines = text.split('\n');
  let out = '', para = [], list = null;

  const flushPara = () => { if (para.length) { out += '<p>' + mdInline(para.join(' ')) + '</p>'; para = []; } };
  const flushList = () => { if (list) { out += `<${list.tag}>` + list.items.map((x) => '<li>' + x + '</li>').join('') + `</${list.tag}>`; list = null; } };

  for (let i = 0; i < lines.length; i++) {
    const l = lines[i];
    const t = l.trim();
    let m;
    if (!t) { flushPara(); flushList(); continue; }
    if ((m = t.match(/^(#{1,4})\s+(.*)/))) { flushPara(); flushList(); out += `<h${m[1].length}>` + mdInline(m[2]) + `</h${m[1].length}>`; continue; }
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(t)) { flushPara(); flushList(); out += '<hr>'; continue; }
    if (t.startsWith('>')) { flushPara(); flushList(); out += '<blockquote><p>' + mdInline(t.replace(/^>\s?/, '')) + '</p></blockquote>'; continue; }
    if (t.startsWith('|') && lines[i + 1] && /^\|?[\s:|-]+\|?$/.test(lines[i + 1].trim()) && lines[i + 1].includes('-')) {
      flushPara(); flushList();
      const rows = [t]; let j = i + 2;
      while (j < lines.length && lines[j].trim().startsWith('|')) rows.push(lines[j++].trim());
      i = j - 1;
      const cells = (r) => r.replace(/^\||\|$/g, '').split('|').map((c) => mdInline(c.trim()));
      out += '<table><thead><tr>' + cells(rows[0]).map((c) => '<th>' + c + '</th>').join('') + '</tr></thead><tbody>'
        + rows.slice(1).map((r) => '<tr>' + cells(r).map((c) => '<td>' + c + '</td>').join('') + '</tr>').join('') + '</tbody></table>';
      continue;
    }
    if ((m = l.match(/^\s*([-*+])\s+(.*)/))) { flushPara(); if (!list || list.tag !== 'ul') { flushList(); list = { tag: 'ul', items: [] }; } list.items.push(mdInline(m[2])); continue; }
    if ((m = l.match(/^\s*(\d+)[.)]\s+(.*)/))) { flushPara(); if (!list || list.tag !== 'ol') { flushList(); list = { tag: 'ol', items: [] }; } list.items.push(mdInline(m[2])); continue; }
    flushList();
    para.push(t);
  }
  flushPara(); flushList();
  return out;
}

function mdInline(s) {
  let h = esc(s);
  h = h.replace(/`([^`]+)`/g, (_, c) => '<code>' + c + '</code>');
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/(^|[\s(])\*([^*\s][^*]*)\*/g, '$1<em>$2</em>');
  h = h.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return h;
}

const state = { entries: [], detailData: [], promptEls: [], theme: localStorage.lensTheme || '' };
const startParams = new URLSearchParams(location.search);
{

/* ---- data source: HTTP API (CLI server) or VS Code webview bridge ---- */

const vscodeApi = typeof acquireVsCodeApi === 'function' ? acquireVsCodeApi() : null;
const pendingRpc = new Map();
let rpcSeq = 0;
if (vscodeApi) {
  window.addEventListener('message', (ev) => {
    const m = ev.data || {};
    if (m.cmd === 'open' && m.project && m.file) {
      openSession(m.project, m.file);
      return;
    }
    const p = pendingRpc.get(m.id);
    if (!p) return;
    pendingRpc.delete(m.id);
    m.ok ? p.resolve(m.data) : p.reject(new Error(m.error || 'bridge error'));
  });
}
function rpc(cmd, args) {
  return new Promise((resolve, reject) => {
    const id = ++rpcSeq;
    pendingRpc.set(id, { resolve, reject });
    vscodeApi.postMessage({ id, cmd, args });
  });
}
const apiProjects = () => vscodeApi ? rpc('projects')
  : fetch('/api/projects').then((r) => r.json());
const apiMeta = (project, file) => vscodeApi ? rpc('meta', { project, file })
  : fetch(`/api/meta?project=${encodeURIComponent(project)}&file=${encodeURIComponent(file)}`).then((r) => r.json());
const apiSessionText = (project, file) => vscodeApi ? rpc('session', { project, file })
  : fetch(`/api/session?project=${encodeURIComponent(project)}&file=${encodeURIComponent(file)}`).then((r) => r.text());
function rememberUrl(qs) {
  if (vscodeApi) return;
  try { history.replaceState(null, '', qs || location.pathname); } catch { /* sandboxed */ }
}

function parseJsonl(text) {
  const out = [];
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    try { out.push(JSON.parse(line)); } catch { /* skip damaged line */ }
  }
  return out;
}

const TOOL_BADGES = {
  Bash: 'sh', Read: 'read', Write: 'write', Edit: 'edit', MultiEdit: 'edit',
  Grep: 'grep', Glob: 'glob', LS: 'ls', Agent: 'agent', Task: 'agent',
  WebFetch: 'web', WebSearch: 'web', TodoWrite: 'todo', NotebookEdit: 'nb',
  ExitPlanMode: 'plan', EnterPlanMode: 'plan', AskUserQuestion: 'ask',
  Skill: 'skill', Artifact: 'art', KillShell: 'sh', BashOutput: 'sh',
};

function toolBadge(name) {
  if (TOOL_BADGES[name]) return TOOL_BADGES[name];
  if (name.startsWith('mcp__')) return 'mcp';
  return name.slice(0, 5).toLowerCase();
}

function toolLabel(name, input) {
  input = input || {};
  const base = (p) => p ? String(p).split('/').pop() : '';
  switch (name) {
    case 'Bash': return input.description || input.command || '';
    case 'Read': case 'Write': case 'Edit': case 'MultiEdit':
      return base(input.file_path) || '';
    case 'Grep': return input.pattern || '';
    case 'Glob': return input.pattern || '';
    case 'Agent': case 'Task': return (input.subagent_type ? input.subagent_type + ' · ' : '') + (input.description || '');
    case 'WebFetch': return input.url || '';
    case 'WebSearch': return input.query || '';
    case 'Skill': return '/' + (input.skill || '');
    case 'TodoWrite': return (input.todos || []).length + ' items';
    case 'AskUserQuestion': return (input.questions || []).map((q) => q.header).join(', ');
    default: {
      if (name.startsWith('mcp__')) {
        const p = name.split('__');
        return p[1] + ' : ' + p.slice(2).join('__');
      }
      const v = Object.values(input).find((x) => typeof x === 'string');
      return v || '';
    }
  }
}

/** Extract plain text from a tool_result content value. */
function resultText(content) {
  if (content == null) return '';
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) {
    return content.map((b) => b.type === 'text' ? b.text : b.type === 'image' ? '[image]' : '').join('\n');
  }
  return JSON.stringify(content, null, 2);
}

/* ==================================================== render pipeline */

function loadSessionText(text, title) {
  state.entries = parseJsonl(text);
  state.detailData = [];
  state.promptEls = [];
  renderTranscript(title);
}

function renderTranscript(fallbackTitle) {
  const entries = state.entries;
  const root = $('#transcript');
  root.innerHTML = '';
  $('#empty').style.display = 'none';

  // ---- session-level facts
  let aiTitle = null, firstTs = null, lastTs = null, gitBranch = null, cwd = null, sessionId = null;
  const models = new Set();
  const usageByReq = new Map();
  let toolCount = 0, promptCount = 0, activeMs = 0;

  for (const e of entries) {
    if (e.type === 'ai-title' && e.aiTitle) aiTitle = e.aiTitle;
    if (e.type === 'summary' && e.summary && !aiTitle) aiTitle = e.summary;
    if (e.timestamp) { const t = Date.parse(e.timestamp); if (!firstTs) firstTs = t; lastTs = t; }
    if (e.gitBranch && !gitBranch) gitBranch = e.gitBranch;
    if (e.cwd && !cwd) cwd = e.cwd;
    if (e.sessionId && !sessionId) sessionId = e.sessionId;
    if (e.type === 'system' && e.subtype === 'turn_duration') activeMs += e.durationMs || 0;
    if (e.type === 'assistant' && e.message) {
      const m = e.message.model;
      if (m && m !== '<synthetic>') models.add(m);
      if (e.message.usage && e.requestId) usageByReq.set(e.requestId, e.message.usage);
      for (const b of e.message.content || []) if (b.type === 'tool_use') toolCount++;
    }
  }

  let inTok = 0, outTok = 0, cacheTok = 0;
  for (const u of usageByReq.values()) {
    inTok += u.input_tokens || 0;
    outTok += u.output_tokens || 0;
    cacheTok += (u.cache_read_input_tokens || 0) + (u.cache_creation_input_tokens || 0);
  }

  // ---- build items
  const toolCards = new Map();   // tool_use id -> {el, dataIdx}
  let currentDay = null;
  let agentGroup = null;         // container for sidechain runs

  const frag = document.createDocumentFragment();
  let turnEl = newTurn(frag);

  function newTurn(parent) {
    const el = document.createElement('section');
    el.className = 'turn';
    parent.appendChild(el);
    return el;
  }

  function closeAgentGroup() { agentGroup = null; }

  function target() {
    return agentGroup ? agentGroup.inner : turnEl;
  }

  for (const e of entries) {
    if (e.type === 'user' && !e.isSidechain) closeAgentGroupIfPromptLike(e);

    if (e.isSidechain && (e.type === 'user' || e.type === 'assistant')) {
      if (!agentGroup) agentGroup = makeAgentGroup(turnEl);
      renderEntry(e, agentGroup.inner, toolCards);
      agentGroup.count++;
      agentGroup.noteEl.textContent = agentGroup.count + ' steps';
      continue;
    }

    if (e.type === 'user' || e.type === 'assistant') {
      const isPrompt = e.type === 'user' && isHumanPrompt(e);
      if (isPrompt) {
        closeAgentGroup();
        turnEl = newTurn(frag);
        promptCount++;
        const day = e.timestamp && dayOf(Date.parse(e.timestamp));
        if (day && day !== currentDay) {
          currentDay = day;
          const dv = document.createElement('div');
          dv.className = 'divider';
          dv.textContent = new Date(e.timestamp).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
          turnEl.appendChild(dv);
        }
      }
      renderEntry(e, target(), toolCards, isPrompt);
      continue;
    }

    if (e.type === 'system' && e.subtype === 'turn_duration' && !e.isSidechain) {
      closeAgentGroup();
      const dv = document.createElement('div');
      dv.className = 'divider';
      dv.textContent = fmtDur(e.durationMs || 0) + ' · ' + (e.messageCount || 0) + ' messages';
      turnEl.appendChild(dv);
      continue;
    }
    if (e.type === 'system' && e.subtype === 'away_summary' && e.content) {
      const n = document.createElement('p');
      n.className = 'sysnote';
      n.textContent = e.content;
      turnEl.appendChild(n);
    }
  }

  function closeAgentGroupIfPromptLike(e) {
    if (isHumanPrompt(e)) closeAgentGroup();
  }

  function makeAgentGroup(parent) {
    const row = document.createElement('div');
    row.className = 'row agent';
    row.innerHTML = `<button class="head" aria-expanded="false">
        <span class="chev">▶</span><span class="badge">agent</span>
        <span class="label">subagent activity</span><span class="note"></span>
      </button><div class="detail"><div class="inner"></div></div>`;
    wireRow(row);
    parent.appendChild(row);
    return { el: row, inner: $('.inner', row), noteEl: $('.note', row), count: 0 };
  }

  root.appendChild(frag);

  // ---- header
  const title = aiTitle || fallbackTitle || 'Session';
  $('#title').textContent = title;
  document.title = title + ' · claude-lens';
  const stats = [];
  if (models.size) stats.push(`<span>${esc([...models].map(shortModel).join(', '))}</span>`);
  if (promptCount) stats.push(`<span><b>${promptCount}</b> prompts</span>`);
  if (toolCount) stats.push(`<span><b>${toolCount}</b> tool calls</span>`);
  if (outTok) stats.push(`<span title="input · cache · output tokens"><b>${fmtTok(inTok)}</b> in · <b>${fmtTok(cacheTok)}</b> cache · <b>${fmtTok(outTok)}</b> out</span>`);
  if (firstTs && lastTs && lastTs > firstTs) stats.push(`<span><b>${fmtDur(lastTs - firstTs)}</b> span</span>`);
  if (activeMs) stats.push(`<span><b>${fmtDur(activeMs)}</b> active</span>`);
  if (gitBranch) stats.push(`<span>on <b>${esc(gitBranch)}</b></span>`);
  $('#stats').innerHTML = stats.join('');

  state.promptEls = [...root.querySelectorAll('.prompt')];
  state.current = { sessionId, cwd, gitBranch, title, firstTs, lastTs };
  document.body.classList.add('has-session');
  buildRail();
  if (startParams.get('expand')) {
    root.querySelectorAll('.row:not(.think)').forEach((r) => toggleRow(r, true));
  }
  window.scrollTo(0, 0);
}

const shortModel = (m) => m.replace(/^claude-/, '').replace(/-\d{8}$/, '');

function isHumanPrompt(e) {
  if (e.isMeta) return false;
  const c = e.message && e.message.content;
  if (typeof c === 'string') return true;
  if (!Array.isArray(c)) return false;
  return c.some((b) => b.type === 'text' || b.type === 'image');
}

/** Render one user/assistant entry into `parent`. */
function renderEntry(e, parent, toolCards, isPrompt) {
  const msg = e.message || {};
  const content = msg.content;

  if (e.type === 'user') {
    if (Array.isArray(content)) {
      for (const b of content) {
        if (b.type === 'tool_result') attachResult(b, e, toolCards);
      }
    }
    if (!isPrompt && !e.isSidechain) return;
    if (e.isMeta) return;
    const blocks = typeof content === 'string' ? [{ type: 'text', text: content }] : (content || []);
    const textBlocks = blocks.filter((b) => b.type === 'text' || b.type === 'image');
    if (!textBlocks.length) return;

    // interruption marker, not a prompt
    if (textBlocks.length === 1 && textBlocks[0].type === 'text' && /^\[Request interrupted/.test(textBlocks[0].text || '')) {
      const n = document.createElement('div');
      n.className = 'interrupt';
      n.textContent = '⏹ ' + textBlocks[0].text.replace(/^\[|\]$/g, '');
      parent.appendChild(n);
      return;
    }

    const el = document.createElement('div');
    el.className = 'prompt';
    let bodyHtml = '';
    for (const b of textBlocks) {
      if (b.type === 'image' && b.source && b.source.data) {
        bodyHtml += `<img loading="lazy" alt="pasted image" src="data:${esc(b.source.media_type)};base64,${b64clean(b.source.data)}" onclick="this.classList.toggle('zoom')">`;
      } else if (b.type === 'text') {
        bodyHtml += promptHtml(b.text || '');
      }
    }
    const who = e.isSidechain ? 'task' : 'you';
    el.innerHTML = `<div class="who"><span>${who}</span>${e.timestamp ? `<time>${clock(Date.parse(e.timestamp))}</time>` : ''}</div><div class="body">${bodyHtml}</div>`;
    parent.appendChild(el);
    return;
  }

  // assistant
  for (const b of msg.content || []) {
    if (b.type === 'text' && b.text && b.text.trim()) {
      const el = document.createElement('div');
      el.className = 'a-text';
      el.innerHTML = md(b.text);
      parent.appendChild(el);
    } else if (b.type === 'thinking' && b.thinking && b.thinking.trim()) {
      const idx = state.detailData.push({ kind: 'thinking', text: b.thinking }) - 1;
      const row = document.createElement('div');
      row.className = 'row think';
      row.dataset.d = idx;
      row.innerHTML = `<button class="head" aria-expanded="false"><span class="chev">▶</span><span class="badge">✳</span>
        <span class="label">thinking</span><span class="note">${fmtTok(Math.round(b.thinking.length / 4))} tok est.</span></button><div class="detail"></div>`;
      wireRow(row);
      parent.appendChild(row);
    } else if (b.type === 'tool_use') {
      const idx = state.detailData.push({ kind: 'tool', name: b.name, input: b.input, result: null, structured: null }) - 1;
      const row = document.createElement('div');
      row.className = 'row';
      row.dataset.d = idx;
      const label = toolLabel(b.name, b.input);
      row.innerHTML = `<button class="head" aria-expanded="false"><span class="chev">▶</span>
        <span class="badge">${esc(toolBadge(b.name))}</span>
        <span class="label">${esc(label || b.name)}</span><span class="note"></span></button><div class="detail"></div>`;
      wireRow(row);
      parent.appendChild(row);
      if (b.id) toolCards.set(b.id, { row, idx });
    }
  }
  if (e.isApiErrorMessage) {
    const n = document.createElement('div');
    n.className = 'interrupt';
    n.textContent = '⚠ API error' + (e.apiErrorStatus ? ' (' + e.apiErrorStatus + ')' : '');
    parent.appendChild(n);
  }
}

function promptHtml(text) {
  // slash-command wrapper messages
  const cm = text.match(/<command-name>([^<]+)<\/command-name>/);
  if (cm) {
    const argM = text.match(/<command-args>([^<]*)<\/command-args>/);
    return `<p><span class="cmd-chip">${esc(cm[1])}${argM && argM[1] ? ' ' + esc(argM[1]) : ''}</span></p>`;
  }
  const so = text.match(/<local-command-stdout>([\s\S]*?)<\/local-command-stdout>/);
  if (so) return so[1].trim() ? '<pre><code>' + esc(so[1].trim().slice(0, 4000)) + '</code></pre>' : '';
  return md(text);
}

function attachResult(b, entry, toolCards) {
  const card = toolCards.get(b.tool_use_id);
  if (!card) return;
  const d = state.detailData[card.idx];
  d.result = resultText(b.content);
  d.isError = !!b.is_error;
  d.structured = entry.toolUseResult || null;
  if (b.is_error) card.row.classList.add('err');
  const note = $('.note', card.row);
  if (note && d.result) note.textContent = d.isError ? 'error' : fmtBytes(d.result.length);
}

/* ------------------------------------------------ lazy detail render */

function wireRow(row) {
  const head = $('.head', row);
  head.addEventListener('click', () => toggleRow(row));
}

function toggleRow(row, force) {
  const open = force !== undefined ? force : !row.classList.contains('open');
  row.classList.toggle('open', open);
  $('.head', row).setAttribute('aria-expanded', String(open));
  if (open && row.dataset.d !== undefined && !row.dataset.built) {
    buildDetail(row, state.detailData[+row.dataset.d]);
    row.dataset.built = '1';
  }
}

const CLIP = 20000;

function clipped(text, cls) {
  const t = String(text);
  if (t.length <= CLIP) return `<pre class="${cls || ''}"><code>${esc(t)}</code></pre>`;
  const idx = state.detailData.push({ kind: 'raw', text: t }) - 1;
  return `<pre class="${cls || ''}"><code>${esc(t.slice(0, CLIP))}</code></pre>
    <button class="more" data-full="${idx}">Show all ${fmtBytes(t.length)}</button>`;
}

function buildDetail(row, d) {
  const detail = $('.detail', row);
  if (!d) return;
  if (d.kind === 'thinking') { detail.textContent = d.text; return; }
  if (d.kind !== 'tool') return;

  let html = '';
  const inp = d.input || {};

  if ((d.name === 'Edit' || d.name === 'MultiEdit')) {
    const edits = d.name === 'Edit' ? [inp] : (inp.edits || []);
    if (inp.file_path) html += `<div class="sec">file</div><pre><code>${esc(inp.file_path)}</code></pre>`;
    for (const ed of edits) {
      if (ed.old_string === undefined) continue;
      html += '<div class="diff">'
        + String(ed.old_string).split('\n').map((l) => `<div class="d">- ${esc(l)}</div>`).join('')
        + String(ed.new_string || '').split('\n').map((l) => `<div class="a">+ ${esc(l)}</div>`).join('')
        + '</div>';
    }
  } else if (d.name === 'Bash' && inp.command) {
    html += `<div class="sec">command</div>` + clipped(inp.command);
  } else if (d.name === 'Write' && inp.file_path) {
    html += `<div class="sec">file</div><pre><code>${esc(inp.file_path)}</code></pre>`;
    if (inp.content) html += `<div class="sec">content</div>` + clipped(inp.content);
  } else if (d.name === 'TodoWrite' && Array.isArray(inp.todos)) {
    html += '<div class="sec">todos</div><pre><code>' + inp.todos.map((t) =>
      (t.status === 'completed' ? '☑' : t.status === 'in_progress' ? '◐' : '☐') + ' ' + esc(t.content || t.subject || '')).join('\n') + '</code></pre>';
  } else if (Object.keys(inp).length) {
    html += `<div class="sec">input</div>` + clipped(JSON.stringify(inp, null, 2));
  }

  if (d.result != null && d.result !== '') {
    html += `<div class="sec">${d.isError ? 'error' : 'result'}</div>` + clipped(d.result);
  }
  detail.innerHTML = html || '<span class="sysnote">no detail recorded</span>';

  detail.addEventListener('click', (ev) => {
    const btn = ev.target.closest('.more');
    if (!btn) return;
    const full = state.detailData[+btn.dataset.full];
    const pre = btn.previousElementSibling;
    pre.querySelector('code').textContent = full.text;
    btn.remove();
  });
}

/** "Today", "Yesterday", weekday within a week, else short date. */
function dateBucket(t) {
  const d = new Date(t), now = new Date();
  const midnight = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
  const days = Math.round((midnight(now) - midnight(d)) / 86400e3);
  if (days <= 0) return 'Today';
  if (days === 1) return 'Yesterday';
  if (days < 7) return d.toLocaleDateString(undefined, { weekday: 'long' });
  return d.toLocaleDateString(undefined, {
    month: 'short', day: 'numeric',
    year: d.getFullYear() === now.getFullYear() ? undefined : 'numeric',
  });
}

const projShort = (name) => name.split('/').pop() || name;

function makeSessBtn(p, s, metaText) {
  const b = document.createElement('button');
  b.className = 'sess';
  b.dataset.project = p.slug;
  b.dataset.file = s.file;
  if (state.sel && state.sel.project === p.slug && state.sel.file === s.file) b.classList.add('active');
  b.innerHTML = `<span class="t">${esc(s.id.slice(0, 8))}…</span><span class="m">${esc(metaText)}</span>`;
  b.addEventListener('click', () => openSession(p.slug, s.file, b));
  lazyTitle(p.slug, s.file, b);
  return b;
}

function renderSidebar() {
  const view = localStorage.lensView || 'date';
  document.querySelectorAll('#view-toggle button').forEach((b) =>
    b.classList.toggle('active', b.dataset.v === view));
  const list = $('#proj-list');
  list.innerHTML = '';
  if (!indexData) return;
  if (view === 'project') renderByProject(list);
  else renderByDate(list);
}

function renderByProject(list) {
  indexData.projects.forEach((p, i) => {
    const det = document.createElement('details');
    det.className = 'proj';
    if (i === 0 || (state.sel && state.sel.project === p.slug)) det.open = true;
    const name = p.name.split('/').slice(-2).join('/');
    det.innerHTML = `<summary title="${esc(p.name)}"><span class="tw">▶</span><span class="pn">${esc(name)}</span><span class="cnt">${p.sessions.length}</span></summary>`;
    let bucket = null;
    for (const s of p.sessions) {
      const b = dateBucket(s.mtime);
      if (b !== bucket) {
        bucket = b;
        const h = document.createElement('div');
        h.className = 'date-h';
        h.textContent = b;
        det.appendChild(h);
      }
      det.appendChild(makeSessBtn(p, s, `${relTime(s.mtime)} · ${fmtBytes(s.size)}`));
    }
    list.appendChild(det);
  });
}

function renderByDate(list) {
  const all = [];
  for (const p of indexData.projects) for (const s of p.sessions) all.push({ p, s });
  all.sort((a, b) => b.s.mtime - a.s.mtime);
  let bucket = null;
  for (const { p, s } of all) {
    const b = dateBucket(s.mtime);
    if (b !== bucket) {
      bucket = b;
      const h = document.createElement('div');
      h.className = 'date-h';
      h.textContent = b;
      list.appendChild(h);
    }
    list.appendChild(makeSessBtn(p, s, `${projShort(p.name)} · ${relTime(s.mtime)} · ${fmtBytes(s.size)}`));
  }
}

document.querySelectorAll('#view-toggle button').forEach((b) =>
  b.addEventListener('click', () => { localStorage.lensView = b.dataset.v; renderSidebar(); }));

const titleQueue = [];
const titleCache = new Map();
let titleBusy = 0;
function lazyTitle(project, file, btn) {
  const key = project + '/' + file;
  const cached = titleCache.get(key);
  if (cached !== undefined) {
    if (cached) { $('.t', btn).textContent = cached; btn.title = cached; }
    return;
  }
  titleQueue.push(async () => {
    try {
      const m = await apiMeta(project, file);
      const t = m.title || m.firstPrompt || '';
      titleCache.set(key, t);
      if (t) { $('.t', btn).textContent = t; btn.title = t; }
    } catch { /* keep uuid label */ }
  });
  pumpTitles();
}
async function pumpTitles() {
  while (titleBusy < 4 && titleQueue.length) {
    titleBusy++;
    const job = titleQueue.shift();
    job().finally(() => { titleBusy--; pumpTitles(); });
  }
}

async function openSession(project, file, btn) {
  state.sel = { project, file };
  btn = btn || document.querySelector(`.sess[data-project="${CSS.escape(project)}"][data-file="${CSS.escape(file)}"]`);
  document.querySelectorAll('.sess.active').forEach((x) => x.classList.remove('active'));
  if (btn) btn.classList.add('active');
  rememberUrl(`?project=${encodeURIComponent(project)}&file=${encodeURIComponent(file)}`);
  $('#title').textContent = 'Loading…';
  const text = await apiSessionText(project, file);
  loadSessionText(text, btn ? $('.t', btn).textContent : file);
}

async function openSingle() {
  const res = await fetch('/api/single');
  if (!res.ok) return;
  loadSessionText(await res.text(), 'Session');
}

/* ================================================== navigation rail */

function buildRail() {
  const rail = $('#rail');
  rail.innerHTML = '';
  const els = state.promptEls;
  rail.classList.toggle('on', els.length > 1);
  els.forEach((el, i) => {
    const t = document.createElement('button');
    t.className = 'tick';
    t.dataset.i = i;
    const time = el.querySelector('time');
    const body = el.querySelector('.body');
    t.dataset.label = 'Prompt ' + (i + 1) + (time ? ' · ' + time.textContent : '');
    t.dataset.snippet = body ? body.textContent.trim().replace(/\s+/g, ' ').slice(0, 180) : '';
    t.setAttribute('aria-label', t.dataset.label);
    rail.appendChild(t);
  });
  updateRailActive();
}

function updateRailActive() {
  const els = state.promptEls;
  if (!els.length) return;
  const y = window.scrollY + 150;
  let idx = els.findLastIndex((el) => el.offsetTop <= y);
  if (idx < 0) idx = 0;
  $('#rail').querySelectorAll('.tick').forEach((t, i) =>
    t.classList.toggle('active', i === idx));
}

let railRaf = 0;
window.addEventListener('scroll', () => {
  if (railRaf) return;
  railRaf = requestAnimationFrame(() => { railRaf = 0; updateRailActive(); });
}, { passive: true });

$('#rail').addEventListener('click', (ev) => {
  const t = ev.target.closest('.tick');
  if (t) state.promptEls[+t.dataset.i].scrollIntoView({ block: 'start', behavior: 'smooth' });
});
$('#rail').addEventListener('mouseover', (ev) => {
  const t = ev.target.closest('.tick');
  if (!t) return;
  const tip = $('#rail-tip');
  $('.n', tip).textContent = t.dataset.label;
  $('.s', tip).textContent = t.dataset.snippet;
  tip.style.display = 'block';
  const r = t.getBoundingClientRect();
  const h = tip.offsetHeight;
  tip.style.top = Math.max(8, Math.min(innerHeight - h - 8, r.top + r.height / 2 - h / 2)) + 'px';
});
$('#rail').addEventListener('mouseleave', () => { $('#rail-tip').style.display = 'none'; });

/** Hide ticks whose turn is filtered out. */
function syncRailFilter() {
  $('#rail').querySelectorAll('.tick').forEach((t) => {
    const el = state.promptEls[+t.dataset.i];
    t.classList.toggle('gone', !!el && el.closest('.turn').classList.contains('filtered'));
  });
}

/* ============================================ resume + context digest */

let toastT;
function showToast(msg) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 3200);
}

async function copyText(text) {
  try { await navigator.clipboard.writeText(text); return true; } catch { /* fall through */ }
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  const ok = document.execCommand('copy');
  ta.remove();
  return ok;
}

const SESSION_ID_RE = /^[A-Za-z0-9-]{4,64}$/;

$('#btn-resume').addEventListener('click', async () => {
  const c = state.current || {};
  if (!c.sessionId || !SESSION_ID_RE.test(c.sessionId)) return showToast('No usable session id in this transcript');
  if (vscodeApi) {
    try { await rpc('resume', { sessionId: c.sessionId, cwd: c.cwd, title: c.title }); showToast('Resuming in a new terminal'); }
    catch (err) { showToast('Resume failed: ' + err.message); }
    return;
  }
  const cd = c.cwd ? `cd '${String(c.cwd).replace(/'/g, "'\\''")}' && ` : '';
  if (await copyText(`${cd}claude --resume ${c.sessionId}`)) {
    showToast('Resume command copied — paste it in your terminal');
  }
});

$('#btn-context').addEventListener('click', async () => {
  const md = buildContextDigest();
  if (!md) return showToast('No session loaded');
  if (await copyText(md)) showToast(`Context digest copied (${fmtBytes(md.length)}) — paste into a new Claude Code session`);
});

/** Compact markdown digest of the session, for seeding a new session. */
function buildContextDigest() {
  const c = state.current;
  if (!c || !state.entries.length) return '';
  const clip = (s, n) => s.length > n ? s.slice(0, n).trimEnd() + ' …[truncated]' : s;
  const lines = ['# ' + (c.title || 'Claude Code session')];
  const facts = [];
  if (c.firstTs) facts.push(new Date(c.firstTs).toLocaleString());
  if (c.cwd) facts.push('cwd: ' + c.cwd);
  if (c.gitBranch) facts.push('branch: ' + c.gitBranch);
  if (c.sessionId) facts.push('resume: claude --resume ' + c.sessionId);
  lines.push('_Digest of a previous Claude Code session (' + facts.join(' · ') + '). Treat as background context._');

  let turn = 0, pendingTools = [];
  const flushTools = () => {
    if (!pendingTools.length) return;
    lines.push('', '> tools: ' + pendingTools.join(' · '));
    pendingTools = [];
  };

  for (const e of state.entries) {
    if (e.isSidechain || e.isMeta) continue;
    if (e.type === 'user' && isHumanPrompt(e)) {
      const blocks = typeof e.message.content === 'string'
        ? [{ type: 'text', text: e.message.content }] : (e.message.content || []);
      let text = blocks.map((b) => b.type === 'text' ? b.text : b.type === 'image' ? '[image]' : '').join('\n').trim();
      if (!text || /^\[Request interrupted/.test(text)) continue;
      const cm = text.match(/<command-name>([^<]+)<\/command-name>/);
      if (cm) text = 'ran ' + cm[1];
      if (text.includes('<local-command-stdout>')) continue;
      flushTools();
      turn++;
      lines.push('', `## Prompt ${turn}`, '', clip(text, 3000));
    } else if (e.type === 'assistant' && e.message) {
      for (const b of e.message.content || []) {
        if (b.type === 'text' && b.text && b.text.trim()) {
          flushTools();
          lines.push('', clip(b.text.trim(), 2500));
        } else if (b.type === 'tool_use') {
          const label = toolLabel(b.name, b.input);
          pendingTools.push(b.name + (label ? '(' + clip(label, 70) + ')' : ''));
        }
      }
    }
  }
  flushTools();
  return lines.join('\n');
}

/* ================================================== chrome behaviors */

$('#btn-theme').addEventListener('click', () => {
  const cur = document.documentElement.dataset.theme
    || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.lensTheme = next;
});

$('#btn-expand').addEventListener('click', () =>
  document.querySelectorAll('#transcript .row:not(.think)').forEach((r) => toggleRow(r, true)));
$('#btn-collapse').addEventListener('click', () =>
  document.querySelectorAll('#transcript .row.open').forEach((r) => toggleRow(r, false)));

let searchT;
$('#search').addEventListener('input', (e) => {
  clearTimeout(searchT);
  searchT = setTimeout(() => {
    const q = e.target.value.trim().toLowerCase();
    document.querySelectorAll('#transcript .turn').forEach((t) => {
      t.classList.toggle('filtered', !!q && !t.textContent.toLowerCase().includes(q));
    });
    syncRailFilter();
  }, 150);
});

document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea') || e.metaKey || e.ctrlKey) return;
  if (e.key !== 'j' && e.key !== 'k') return;
  const els = state.promptEls.filter((el) => !el.closest('.turn').classList.contains('filtered'));
  if (!els.length) return;
  const y = window.scrollY + 80;
  let i = els.findIndex((el) => el.offsetTop > y + 4);
  if (i === -1) i = els.length;
  const next = e.key === 'j' ? Math.min(i, els.length - 1)
    : Math.max(0, (els.findLastIndex((el) => el.offsetTop < y - 4)));
  els[next].scrollIntoView({ block: 'start', behavior: 'smooth' });
});

// drag & drop a .jsonl (works even with no server API)
let dragDepth = 0;
document.addEventListener('dragenter', (e) => { e.preventDefault(); dragDepth++; document.body.classList.add('dragging'); });
document.addEventListener('dragleave', () => { if (--dragDepth <= 0) { dragDepth = 0; document.body.classList.remove('dragging'); } });
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', async (e) => {
  e.preventDefault();
  dragDepth = 0;
  document.body.classList.remove('dragging');
  const f = e.dataTransfer.files && e.dataTransfer.files[0];
  if (!f) return;
  loadSessionText(await f.text(), f.name.replace(/\.jsonl$/, ''));
  rememberUrl();
});

// hosts (CLI server / extension) substitute the real version; hide if raw
if ($('#ver').textContent.startsWith('__')) $('#ver').textContent = '';

loadIndex();
if (vscodeApi) vscodeApi.postMessage({ cmd: 'ready' });
</script>
